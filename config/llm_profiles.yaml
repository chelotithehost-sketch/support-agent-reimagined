# config/llm_profiles.yaml
# ───────────────────────────────────────────────
# LLM model profiles for the Router.
# Copy into: config/llm_profiles.yaml
#
# Scoring: capability_match(0.40) + cost_efficiency(0.25) + latency(0.15) + csat(0.20)

models:
  # ── Local (always available, free) ───────────

  ollama/qwen2.5:7b:
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    avg_latency_ms: 800
    context_window: 32000
    supports_json_mode: false
    capabilities:
      - general
      - email
      - billing
      - dns
      - ssl
      - cpanel
      - wordpress
    max_urgency: critical
    is_local: true
    always_available: true

  # ── Cloud (cheap, fast) ─────────────────────

  openai/gpt-4o-mini:
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006
    avg_latency_ms: 500
    context_window: 128000
    supports_json_mode: true
    capabilities:
      - general
      - email
      - billing
      - dns
      - ssl
      - cpanel
      - wordpress
      - json_mode
      - long_context
    max_urgency: critical
    is_local: false
    always_available: false

  # ── Cloud (capable, moderate cost) ──────────

  openai/gpt-4o:
    cost_per_1k_input: 0.005
    cost_per_1k_output: 0.015
    avg_latency_ms: 1200
    context_window: 128000
    supports_json_mode: true
    capabilities:
      - general
      - email
      - billing
      - dns
      - ssl
      - cpanel
      - wordpress
      - json_mode
      - long_context
      - reasoning
      - legal
    max_urgency: critical
    is_local: false
    always_available: false

  # ── Cloud (premium, high cost) ──────────────

  anthropic/claude-3.5-sonnet:
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    avg_latency_ms: 1500
    context_window: 200000
    supports_json_mode: true
    capabilities:
      - general
      - email
      - billing
      - dns
      - ssl
      - cpanel
      - wordpress
      - json_mode
      - long_context
      - reasoning
      - legal
      - empathy
    max_urgency: critical
    is_local: false
    always_available: false
