version: "3.9"

services:
  # ── Application ────────────────────────────────────────────────
  afriagent:
    build: .
    container_name: afriagent-app
    ports:
      - "${AFRI_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./src:/app/src  # Hot reload in dev

  # ── Redis (Tier 1 — Session State) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: afriagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL (Tier 2 — Episodic Memory) ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: afriagent-postgres
    environment:
      POSTGRES_USER: afriagent
      POSTGRES_PASSWORD: afriagent
      POSTGRES_DB: afriagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afriagent"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Qdrant (Tier 3 — Semantic Memory) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: afriagent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Observability ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: afriagent-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: afriagent-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  grafana_data:
